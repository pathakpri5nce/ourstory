<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Story ❤️</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>

<body>

<!-- 🎬 CINEMATIC INTRO SCREEN -->
<div class="intro" id="intro">
  <h1>My cutieee Divyanshiiiiiiiiiii...</h1>
</div>

<!-- 🎬 HERO -->
<section class="hero">

  <video id="bgVideo" loop playsinline class="bg-video">
    <source src="assets/videos/background.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="hero-content">
    <h1>I'm Sorry ❤️</h1>
    <p>Something I made just for you</p>
    <button onclick="startExperience()">▶ Begin</button>
  </div>
</section>

<!-- 💌 LETTER -->
<section class="letter">
  <h2>My Heart to You 💌</h2>
  <p id="typingText"></p>
</section>

<!-- 📸 GALLERY -->
<section class="gallery">
  <h2>Our Memories 📸</h2>
  <div class="grid">
    <img src="assets/photos/photo1.jpg">
    <img src="assets/photos/photo2.jpg">
    <img src="assets/photos/photo3.jpg">
    <img src="assets/photos/photo4.jpg">
  </div>
</section>

<!-- 🎁 FINAL GIFT -->
<section class="gift">
  <h2>One Last Thing 🎁</h2>
  <button onclick="openGift()">Open Gift</button>
  <p id="giftText"></p>
</section>

<script src="script.js"></script>
</body>
</html>
