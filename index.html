<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Story ❤️</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>

<body>

<!-- 🎬 CINEMATIC INTRO -->
<div class="intro" id="intro">
  <h1>My cutieeeeeee Divyanshiiiiiii ❤️</h1>
</div>

<!-- 🎬 MAIN HERO -->
<section class="hero">

  <video id="bgVideo" loop playsinline class="bg-video">
    <source src="assets/videos/background.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="hero-content">
    <h1>I'm Sorry ❤️</h1>
    <p>This is my heart in digital form</p>

    <button onclick="startExperience()" class="btn">
      ▶ Enter My World
    </button>
  </div>

</section>

<!-- 💌 LETTER -->
<section class="letter">
  <h2>My Heart to You 💌</h2>
  <p id="typingText"></p>
</section>

<!-- 📸 MEMORY VAULT -->
<section class="gallery">
  <h2>Memory Vault 📸</h2>
  <div class="grid">
    <img src="assets/photos/photo1.jpg">
    <img src="assets/photos/photo2.jpg">
    <img src="assets/photos/photo3.jpg">
    <img src="assets/photos/photo4.jpg">
  </div>
</section>

<!-- 🎁 FINAL GIFT -->
<section class="gift">
  <h2>Final Message 🎁</h2>
  <button onclick="openGift()">Reveal</button>
  <p id="giftText"></p>
</section>

<!-- 🎵 AUDIO ENGINE -->
<audio id="bgMusic" loop preload="auto">
  <source src="assets/music/background.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
</html>
