<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Our Story ❤️</title>

<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>

<body>

<!-- 🌙 HEADER -->
<div class="top-bar">
  <button onclick="toggleMode()">🌙</button>
  <button onclick="toggleMusic()">🎵</button>
</div>

<!-- 🎬 HERO -->
<section class="hero">
  <video autoplay loop class="bg-video" controls>
    <source src="assets/videos/background.mp4">
  </video>
  <div class="overlay"></div>

  <div class="hero-content">
    <h1>I'm Sorry ❤️</h1>
    <p>A little world I made for you</p>
    <button onclick="startExperience()">Open My Heart</button>
  </div>
</section>

<!-- 💬 CHAT APOLOGY -->
<section class="chat" id="chatBox">
  <div class="bubble me">Hey...</div>
  <div class="bubble me">I made something for you</div>
  <div class="bubble me">I just want to say sorry...</div>
  <div class="bubble me typing" id="typingText"></div>
</section>

<!-- 📸 GALLERY -->
<section class="gallery">
  <h2>Our Memories 📸</h2>
  <div class="grid">
    <img src="assets/photos/photo1.jpg" onclick="openImage(this.src)">
    <img src="assets/photos/photo2.jpg" onclick="openImage(this.src)">
    <img src="assets/photos/photo3.jpg" onclick="openImage(this.src)">
    <img src="assets/photos/photo4.jpg" onclick="openImage(this.src)">
  </div>
</section>

<!-- 🎁 GIFT -->
<section class="gift">
  <h2>One Last Thing 🎁</h2>
  <button onclick="openGift()">Open Gift</button>
  <p id="giftText"></p>
</section>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop>
  <source src="assets/music/background.mp3">
</audio>

<!-- 🖼 LIGHTBOX -->
<div id="lightbox" onclick="closeImage()">
  <img id="lightboxImg">
</div>

<!-- 🌸 EFFECTS -->
<div id="particles"></div>

<script src="script.js"></script>
</body>
</html>
